name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Runs all deterministic checks on a single platform.
  # fmt, clippy, audit, and frontend steps produce the same result on every OS —
  # no need to repeat them across the matrix.
  quality:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libssl-dev nasm

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Svelte / TypeScript type check
        run: pnpm check

      - name: Frontend tests
        run: pnpm test

      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy --workspace -- -D warnings

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Cargo audit
        working-directory: src-tauri
        run: cargo audit

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Cargo deny (licenses + sources)
        working-directory: src-tauri
        run: cargo deny check licenses sources

      - name: Architecture check (no tauri:: in core/)
        working-directory: src-tauri
        run: |
          if grep -rn "use tauri::" src/core/; then
            echo "ERROR: tauri:: import found in src/core/ (violates core purity)"
            exit 1
          fi
          echo "core/ is pure Rust"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Rust tests (ubuntu)
        working-directory: src-tauri
        run: cargo nextest run --workspace

  # Runs cargo test on macOS and Windows in parallel with quality.
  # These catch platform-specific behaviour (native HEIC, WIC, file paths).
  platform-test:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy --workspace -- -D warnings

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Rust tests
        working-directory: src-tauri
        run: cargo nextest run --workspace
